<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Fake News AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* CYBERPUNK BACKGROUND */

body{
margin:0;
font-family:'Inter';
background:radial-gradient(circle at 20% 20%,#0f172a,#020617);
color:#e2e8f0;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:linear-gradient(180deg,#020617,#020617,#020617);
border-right:1px solid #0ea5e9;
padding:25px;
box-shadow:0 0 20px #0ea5e930;
}

.logo{
font-family:'Orbitron';
font-size:22px;
font-weight:600;
color:#22c55e;
margin-bottom:30px;
text-shadow:0 0 8px #22c55e;
}

/* NAV */

.nav{
padding:12px;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
transition:0.3s;
border:1px solid transparent;
}

.nav:hover{
background:#0f172a;
border:1px solid #22c55e;
box-shadow:0 0 10px #22c55e;
}

.nav.active{
background:#22c55e;
color:black;
}

/* MAIN */

.main{
flex:1;
padding:40px;
overflow:auto;
}

/* SECTION */

.section{
display:none;
}

.section.active{
display:block;
}

/* CARD */

.card{
background:#020617;
padding:25px;
border-radius:12px;
margin-bottom:20px;
border:1px solid #1e293b;
box-shadow:0 0 25px #0ea5e920;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.metric{
background:#020617;
padding:20px;
border-radius:10px;
text-align:center;
border:1px solid #1e293b;
}

.metric-value{
font-size:28px;
font-weight:600;
font-family:'Orbitron';
}

/* INPUT */

textarea,input{
width:100%;
background:#020617;
border:1px solid #1e293b;
color:white;
padding:10px;
margin-top:10px;
border-radius:8px;
}

/* BUTTON */

button{
margin-top:10px;
padding:10px 20px;
background:#22c55e;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

button:hover{
box-shadow:0 0 12px #22c55e;
}

/* RESULT */

.result{
font-size:30px;
font-weight:700;
margin-top:10px;
font-family:'Orbitron';
}

.fake{color:#ef4444}
.real{color:#22c55e}

/* NEWS */

.news-item{
padding:10px;
border-bottom:1px solid #111827;
}

.news-item a{
color:#38bdf8;
text-decoration:none;
}

/* HEATMAP */

.keyword{
display:inline-block;
padding:5px 10px;
margin:5px;
border-radius:6px;
background:#0f172a;
border:1px solid #22c55e;
}

/* SPEED */

.speed{
font-size:14px;
color:#38bdf8;
margin-top:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">Fake News Detection AI</div>

<div class="nav active" onclick="showTab('dashboard',this)">Dashboard</div>
<div class="nav" onclick="showTab('analyzer',this)">AI Analyzer</div>
<div class="nav" onclick="showTab('news',this)">Live News</div>
<div class="nav" onclick="showTab('analytics',this)">Analytics</div>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section active">

<div class="card">

<h2>AI Analytics Dashboard</h2>

<div class="grid">

<div class="metric">
Total Predictions
<div id="total" class="metric-value">0</div>
</div>

<div class="metric">
Fake News
<div id="fake" class="metric-value">0</div>
</div>

<div class="metric">
Real News
<div id="real" class="metric-value">0</div>
</div>

</div>

<canvas id="analyticsChart"></canvas>
<canvas id="trendChart"></canvas>

</div>

</div>

<!-- ANALYZER -->

<div id="analyzer" class="section">

<div class="card">

<h2>AI News Analyzer</h2>

<textarea id="newsText" placeholder="Paste article..."></textarea>

<input id="newsURL" placeholder="or paste URL">

<button onclick="analyze()">Analyze</button>

<div class="speed" id="speed"></div>

<div id="resultBox"></div>

<div id="explanation"></div>

<div id="heatmap"></div>

<canvas id="resultChart"></canvas>

</div>

</div>

<!-- LIVE NEWS -->

<div id="news" class="section">

<div class="card">

<h2>Live News Feed</h2>

<div id="newsList"></div>

</div>

</div>

<!-- ANALYTICS -->

<div id="analytics" class="section">

<div class="card">

<h2>AI Prediction Chart</h2>

<canvas id="analyticsChart2"></canvas>

</div>

</div>

</div>

<script>

let resultChart
let analyticsChart
let trendChart

/* TAB */

function showTab(id,el){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")

document.querySelectorAll(".nav").forEach(n=>n.classList.remove("active"))
el.classList.add("active")

}

/* ANALYZE */

function analyze(){

let start=performance.now()

let text=document.getElementById("newsText").value
let url=document.getElementById("newsURL").value

fetch("/predict",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({news:text,url:url})

})

.then(res=>res.json())

.then(data=>{

let end=performance.now()

let speed=Math.round(end-start)

document.getElementById("speed").innerText="Prediction speed: "+speed+" ms"

let result=data.prediction

let box=document.getElementById("resultBox")

box.innerHTML=`<div class="result ${result=='FAKE'?'fake':'real'}">${result}</div>
Confidence: ${data.confidence}%
<br>Language: ${data.language}
<br>Sentiment: ${data.sentiment}`

document.getElementById("explanation").innerHTML="<br><b>AI Explanation:</b> "+data.explanation

drawHeatmap(data.explanation)

drawResultChart(data.fake_probability,data.real_probability)

loadAnalytics()

})

}

/* RESULT CHART */

function drawResultChart(fake,real){

if(resultChart) resultChart.destroy()

resultChart=new Chart(resultChart=document.getElementById("resultChart"),{

type:"doughnut",

data:{
labels:["Fake","Real"],
datasets:[{
data:[fake,real],
backgroundColor:["#ef4444","#22c55e"]
}]
}

})

}

/* HEATMAP */

function drawHeatmap(text){

let words=text.split(" ")

let box=document.getElementById("heatmap")

box.innerHTML="<br><b>Keyword Heatmap</b><br>"

words.forEach(w=>{

let span=document.createElement("span")

span.className="keyword"

span.innerText=w

box.appendChild(span)

})

}

/* ANALYTICS */

function loadAnalytics(){

fetch("/api/analytics")

.then(res=>res.json())

.then(data=>{

document.getElementById("total").innerText=data.total_predictions
document.getElementById("fake").innerText=data.fake_news
document.getElementById("real").innerText=data.real_news

if(analyticsChart) analyticsChart.destroy()

analyticsChart=new Chart(document.getElementById("analyticsChart"),{

type:"pie",

data:{
labels:["Fake","Real"],
datasets:[{
data:[data.fake_news,data.real_news],
backgroundColor:["#ef4444","#22c55e"]
}]
}

})

})

}

/* TREND */

function loadTrend(){

fetch("/api/trend")

.then(res=>res.json())

.then(data=>{

let labels=data.trend.map(t=>t.time)

let fake=data.trend.map(t=>t.fake)
let real=data.trend.map(t=>t.real)

if(trendChart) trendChart.destroy()

trendChart=new Chart(document.getElementById("trendChart"),{

type:"line",

data:{
labels:labels,
datasets:[
{
label:"Fake",
data:fake,
borderColor:"#ef4444"
},
{
label:"Real",
data:real,
borderColor:"#22c55e"
}
]
}

})

})

}

/* NEWS */

function loadNews(){

fetch("/api/news")

.then(res=>res.json())

.then(data=>{

let list=document.getElementById("newsList")

list.innerHTML=""

data.articles.forEach(n=>{

let div=document.createElement("div")

div.className="news-item"

div.innerHTML=`<a href="${n.link}" target="_blank">${n.title}</a>`

list.appendChild(div)

})

})

}

/* AUTO REFRESH */

loadAnalytics()
loadTrend()
loadNews()

setInterval(loadNews,30000)
setInterval(loadTrend,10000)

</script>

</body>
</html>
